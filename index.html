<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0"
    />
    <title>$GODOT_PROJECT_NAME</title>
    <style>
      html,
      body,
      #canvas {
        margin: 0;
        padding: 0;
        border: 0;
      }

      body {
        color: white;
        background-color: black;
        overflow: hidden;
        touch-action: none;
      }

      #canvas {
        display: block;
      }

      #canvas:focus {
        outline: none;
      }

      #status {
        position: absolute;
        inset: 0;
        background-color: #000000;
        visibility: hidden;
      }

      #status-splash {
        display: none;
      }

      #status-progress,
      #status-notice {
        display: none;
      }

      #status-progress {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        appearance: none;
        -webkit-appearance: none;
        border: none;
        margin: 0;
        padding: 0;
        background-color: #000000;
        z-index: 1;
      }

      #status-progress::-webkit-progress-bar {
        background-color: #000000;
      }

      #status-progress::-webkit-progress-value {
        background-color: #750000;
      }

      #status-progress::-moz-progress-bar {
        background-color: #750000;
      }

      #not-like-her {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #000000;
        font-family: "Georgia", "Times New Roman", serif;
        font-size: 15vw;
        font-weight: bold;
        letter-spacing: 0.05em;
        text-align: center;
        user-select: none;
        z-index: 2;
        pointer-events: none;
      }

      #status-notice {
        position: absolute;
        bottom: 2rem;
        left: 2rem;
        right: 2rem;
        background-color: #5b0000;
        border-radius: 0.5rem;
        border: 1px solid #9b0000;
        color: #e0e0e0;
        font-family: "Noto Sans", "Droid Sans", Arial, sans-serif;
        line-height: 1.3;
        overflow: hidden;
        padding: 1rem;
        text-align: center;
        z-index: 3;
      }
    </style>
    $GODOT_HEAD_INCLUDE
  </head>
  <body>
    <canvas id="canvas"> Your browser does not support the canvas tag. </canvas>

    <noscript> Your browser does not support JavaScript. </noscript>

    <div id="status">
      <progress id="status-progress"></progress>
      <div id="not-like-her">Spin & Slay</div>
      <div id="status-notice"></div>
    </div>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-EMBE58ZS6G"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-EMBE58ZS6G", {
        send_page_view: true,
        allow_google_signals: false,
        allow_ad_personalization_signals: false,
      });
    </script>

    <script src="$GODOT_URL"></script>
    <script>
      const GODOT_CONFIG = $GODOT_CONFIG;
      const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
      const engine = new Engine(GODOT_CONFIG);

      (function () {
        const statusOverlay = document.getElementById("status");
        const statusProgress = document.getElementById("status-progress");
        const statusNotice = document.getElementById("status-notice");

        let initializing = true;
        let statusMode = "";

        function setStatusMode(mode) {
          if (statusMode === mode || !initializing) {
            return;
          }
          if (mode === "hidden") {
            statusOverlay.remove();
            initializing = false;
            return;
          }
          statusOverlay.style.visibility = "visible";
          statusProgress.style.display = mode === "progress" ? "block" : "none";
          statusNotice.style.display = mode === "notice" ? "block" : "none";
          statusMode = mode;
        }

        function setStatusNotice(text) {
          while (statusNotice.lastChild) {
            statusNotice.removeChild(statusNotice.lastChild);
          }
          const lines = text.split("\n");
          lines.forEach((line) => {
            statusNotice.appendChild(document.createTextNode(line));
            statusNotice.appendChild(document.createElement("br"));
          });
        }

        function displayFailureNotice(err) {
          console.error(err);
          if (err instanceof Error) {
            setStatusNotice(err.message);
          } else if (typeof err === "string") {
            setStatusNotice(err);
          } else {
            setStatusNotice("An unknown error occurred.");
          }
          setStatusMode("notice");
          initializing = false;
        }

        const missing = Engine.getMissingFeatures({
          threads: GODOT_THREADS_ENABLED,
        });

        if (missing.length !== 0) {
          if (
            GODOT_CONFIG["serviceWorker"] &&
            GODOT_CONFIG["ensureCrossOriginIsolationHeaders"] &&
            "serviceWorker" in navigator
          ) {
            let serviceWorkerRegistrationPromise;
            try {
              serviceWorkerRegistrationPromise =
                navigator.serviceWorker.getRegistration();
            } catch (err) {
              serviceWorkerRegistrationPromise = Promise.reject(
                new Error("Service worker registration failed."),
              );
            }
            // There's a chance that installing the service worker would fix the issue
            Promise.race([
              serviceWorkerRegistrationPromise
                .then((registration) => {
                  if (registration != null) {
                    return Promise.reject(
                      new Error("Service worker already exists."),
                    );
                  }
                  return registration;
                })
                .then(() => engine.installServiceWorker()),
              // For some reason, `getRegistration()` can stall
              new Promise((resolve) => {
                setTimeout(() => resolve(), 2000);
              }),
            ])
              .then(() => {
                // Reload if there was no error.
                window.location.reload();
              })
              .catch((err) => {
                console.error("Error while registering service worker:", err);
              });
          } else {
            // Display the message as usual
            const missingMsg =
              "Error\nThe following features required to run Godot projects on the Web are missing:\n";
            displayFailureNotice(missingMsg + missing.join("\n"));
          }
        } else {
          setStatusMode("progress");
          engine
            .startGame({
              onProgress: function (current, total) {
                if (current > 0 && total > 0) {
                  statusProgress.value = current;
                  statusProgress.max = total;
                } else {
                  statusProgress.removeAttribute("value");
                  statusProgress.removeAttribute("max");
                }
              },
            })
            .then(() => {
              setStatusMode("hidden");
            }, displayFailureNotice);
        }
      })();
    </script>
  </body>
</html>
